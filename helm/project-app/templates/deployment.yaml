apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "project-app.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "project-app.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "project-app.name" . }}
    spec:
      containers:
      - name: app
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: 80

        envFrom:
        - configMapRef:
            name: {{ include "project-app.fullname" . }}-config
        - secretRef:
            name: {{ include "project-app.fullname" . }}-secret

        volumeMounts:
        - name: data
          mountPath: /app/data

      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "project-app.fullname" . }}-pvc