name: Deploy to Kubernetes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🐳 Login to DockerHub
        run: docker login -u ${{ secrets.DOCKER_USER }} -p ${{ secrets.DOCKER_PASS }}

      - name: 🏗️ Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USER }}/login-app:latest ./app

      - name: 🚀 Push Docker Image
        run: docker push ${{ secrets.DOCKER_USER }}/login-app:latest

      - name: ☸️ Setup Kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig

      - name: 🚀 Deploy with Helm
        run: |
          export KUBECONFIG=./kubeconfig
          helm upgrade --install myapp ./helm/project-app
